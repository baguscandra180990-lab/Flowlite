plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}
android {
    namespace 'com.bagus.flowlite'
    compileSdk 34
    defaultConfig {
        applicationId "com.bagus.flowlite"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
        }
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
